
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .app {
    font-family: 'Exo 2', sans-serif;
    background: #0a0e1a;
    min-height: 600px;
    color: #c8d0e0;
    padding: 24px;
    border-radius: 12px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #c89b3c, #f0d785);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #0a0e1a;
    font-family: 'Rajdhani', sans-serif;
  }

  .title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: #f0d785; letter-spacing: 1px; }
  .subtitle { font-size: 11px; color: #5a6a8a; letter-spacing: 2px; text-transform: uppercase; }

  .teams {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .team-panel {
    background: #111827;
    border-radius: 10px;
    padding: 16px;
    border: 1px solid #1e2d45;
  }

  .team-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .team-ally .team-label { color: #4a9eff; }
  .team-enemy .team-label { color: #ff4a4a; }

  .champion-slots {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .champ-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .role-icon {
    font-size: 12px;
    color: #3a4a6a;
    width: 48px;
    flex-shrink: 0;
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  .champ-input {
    flex: 1;
    background: #0a0e1a;
    border: 1px solid #1e2d45;
    border-radius: 6px;
    padding: 7px 10px;
    color: #c8d0e0;
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .team-ally .champ-input:focus { border-color: #4a9eff; }
  .team-enemy .champ-input:focus { border-color: #ff4a4a; }

  .style-section {
    background: #111827;
    border-radius: 10px;
    padding: 16px;
    border: 1px solid #1e2d45;
    margin-bottom: 20px;
  }

  .style-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c89b3c;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .style-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .style-btn {
    background: #0a0e1a;
    border: 1px solid #1e2d45;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: #5a6a8a;
    cursor: pointer;
    font-family: 'Exo 2', sans-serif;
    transition: all 0.15s;
  }

  .style-btn.active {
    background: #1a2a1a;
    border-color: #4aff7a;
    color: #4aff7a;
  }

  .style-btn:hover:not(.active) {
    border-color: #3a4a6a;
    color: #c8d0e0;
  }

  .analyze-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #c89b3c, #f0d785);
    border: none;
    border-radius: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #0a0e1a;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    margin-bottom: 20px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .analyze-btn:hover { opacity: 0.9; }
  .analyze-btn:active { transform: scale(0.99); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-panel {
    background: #111827;
    border-radius: 10px;
    padding: 20px;
    border: 1px solid #1e2d45;
    display: none;
  }

  .result-panel.visible { display: block; }

  .loading-dots {
    text-align: center;
    padding: 20px;
    color: #c89b3c;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1e2d45;
  }

  .win-badge {
    background: #0d2d1a;
    border: 1px solid #2a6a3a;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: #4aff7a;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
  }

  .result-text {
    font-size: 13px;
    line-height: 1.7;
    color: #8a9ab8;
    white-space: pre-wrap;
  }

  .result-text strong {
    color: #f0d785;
    font-weight: 500;
  }

  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
    margin-bottom: 4px;
  }

  .tag {
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
  }

  .tag-phase { background: #1a1a2d; color: #8a8aff; border: 1px solid #2a2a5a; }
  .tag-risk  { background: #2d1a1a; color: #ff8a8a; border: 1px solid #5a2a2a; }
  .tag-win   { background: #0d2d1a; color: #4aff7a; border: 1px solid #1a5a2a; }
  .tag-style { background: #2d2a0d; color: #f0d785; border: 1px solid #5a4a0d; }

  .share-bar {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #1e2d45;
  }

  .share-btn {
    flex: 1;
    background: #0a0e1a;
    border: 1px solid #1e2d45;
    border-radius: 6px;
    padding: 8px;
    font-size: 11px;
    color: #5a6a8a;
    cursor: pointer;
    font-family: 'Exo 2', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    text-align: center;
  }

  .share-btn:hover { border-color: #c89b3c; color: #c89b3c; }

  .error-msg {
    color: #ff6a6a;
    font-size: 12px;
    margin-top: 10px;
    display: none;
  }
</style>

<div class="app">
  <div class="header">
    <div class="logo">S</div>
    <div>
      <div class="title">LoL Strategist</div>
      <div class="subtitle">AI Draft &amp; Strategy Coach</div>
    </div>
  </div>

  <div class="teams">
    <div class="team-panel team-ally">
      <div class="team-label">Tu equipo (aliados)</div>
      <div class="champion-slots" id="ally-slots"></div>
    </div>
    <div class="team-panel team-enemy">
      <div class="team-label">Equipo enemigo</div>
      <div class="champion-slots" id="enemy-slots"></div>
    </div>
  </div>

  <div class="style-section">
    <div class="style-label">Tu estilo de juego</div>
    <div class="style-options">
      <button class="style-btn" onclick="toggleStyle(this)">Agresivo early</button>
      <button class="style-btn" onclick="toggleStyle(this)">Escalar a late</button>
      <button class="style-btn" onclick="toggleStyle(this)">Split push</button>
      <button class="style-btn" onclick="toggleStyle(this)">Teamfight</button>
      <button class="style-btn" onclick="toggleStyle(this)">Poke &amp; control</button>
      <button class="style-btn" onclick="toggleStyle(this)">Roaming</button>
      <button class="style-btn active" onclick="toggleStyle(this)">Cualquiera (recomienda tú)</button>
    </div>
  </div>

  <button class="analyze-btn" onclick="analyze()" id="analyzeBtn">Analizar composición</button>
  <div class="error-msg" id="errorMsg">Ingresa al menos 5 campeones (3 aliados mínimo) para analizar.</div>

  <div class="result-panel" id="resultPanel">
    <div class="loading-dots" id="loadingDots">Analizando el draft...</div>
    <div id="resultContent" style="display:none">
      <div class="result-header">
        <div class="win-badge" id="winBadge">WIN CONDITION DETECTADA</div>
      </div>
      <div class="tags-row" id="tagsRow"></div>
      <div class="result-text" id="resultText"></div>
      <div class="share-bar">
        <button class="share-btn" onclick="copyResult()">Copiar para compartir</button>
        <button class="share-btn" onclick="exportCard()">Exportar tarjeta</button>
      </div>
    </div>
  </div>
</div>

<script>
const roles = ['Top', 'Jungla', 'Mid', 'ADC', 'Support'];

function buildSlots(containerId, prefix) {
  const el = document.getElementById(containerId);
  roles.forEach((r, i) => {
    el.innerHTML += `
      <div class="champ-input-row">
        <span class="role-icon">${r}</span>
        <input class="champ-input" id="${prefix}-${i}" placeholder="${r}..." autocomplete="off" spellcheck="false" />
      </div>`;
  });
}

buildSlots('ally-slots', 'ally');
buildSlots('enemy-slots', 'enemy');

function toggleStyle(btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getChamps(prefix) {
  return roles.map((_, i) => document.getElementById(`${prefix}-${i}`).value.trim()).filter(Boolean);
}

function getStyle() {
  const active = document.querySelector('.style-btn.active');
  return active ? active.textContent : 'Cualquiera';
}

let lastResult = '';

async function analyze() {
  const allies = getChamps('ally');
  const enemies = getChamps('enemy');
  const errorEl = document.getElementById('errorMsg');

  if (allies.length < 3) {
    errorEl.style.display = 'block';
    setTimeout(() => errorEl.style.display = 'none', 3000);
    return;
  }

  errorEl.style.display = 'none';
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analizando...';

  const panel = document.getElementById('resultPanel');
  const loading = document.getElementById('loadingDots');
  const content = document.getElementById('resultContent');

  panel.classList.add('visible');
  loading.style.display = 'block';
  content.style.display = 'none';

  const style = getStyle();
  const allyList = roles.map((r, i) => {
    const v = document.getElementById(`ally-${i}`).value.trim();
    return v ? `${r}: ${v}` : null;
  }).filter(Boolean).join(', ');
  const enemyList = roles.map((r, i) => {
    const v = document.getElementById(`enemy-${i}`).value.trim();
    return v ? `${r}: ${v}` : null;
  }).filter(Boolean).join(', ');

  const prompt = `Eres un coach experto de League of Legends de alto elo. Analiza este draft y da estrategia concreta.

EQUIPO ALIADO: ${allyList}
EQUIPO ENEMIGO: ${enemyList}
ESTILO DEL JUGADOR: ${style}

Responde en este formato exacto (en español, conciso y directo):

WIN CONDITION: [1 frase, qué necesitas hacer para ganar]

FASE EARLY (0-15 min): [2-3 decisiones concretas]

FASE MID (15-25 min): [2-3 decisiones concretas]

FASE LATE (25+ min): [cómo cerrar la partida]

MAYOR AMENAZA ENEMIGA: [qué campeón/combo debes respetar más y por qué]

CONSEJO DE ORO: [1 tip específico para este matchup que la mayoría ignora]

Sé específico con los nombres de campeones. No des consejos genéricos. Máximo 250 palabras.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.[0]?.text || 'No se pudo generar análisis.';
    lastResult = text;

    loading.style.display = 'none';
    content.style.display = 'block';

    const tagsRow = document.getElementById('tagsRow');
    tagsRow.innerHTML = '';

    if (text.toLowerCase().includes('early')) tagsRow.innerHTML += '<span class="tag tag-phase">Early game</span>';
    if (text.toLowerCase().includes('late')) tagsRow.innerHTML += '<span class="tag tag-phase">Late game</span>';
    if (style !== 'Cualquiera (recomienda tú)') tagsRow.innerHTML += `<span class="tag tag-style">${style}</span>`;

    const formatted = text
      .replace(/WIN CONDITION:/g, '<strong>WIN CONDITION:</strong>')
      .replace(/FASE EARLY[^:]*:/g, m => `<strong>${m}</strong>`)
      .replace(/FASE MID[^:]*:/g, m => `<strong>${m}</strong>`)
      .replace(/FASE LATE[^:]*:/g, m => `<strong>${m}</strong>`)
      .replace(/MAYOR AMENAZA ENEMIGA:/g, '<strong>MAYOR AMENAZA ENEMIGA:</strong>')
      .replace(/CONSEJO DE ORO:/g, '<strong>CONSEJO DE ORO:</strong>');

    document.getElementById('resultText').innerHTML = formatted;

  } catch (e) {
    loading.style.display = 'none';
    content.style.display = 'block';
    document.getElementById('resultText').textContent = 'Error al conectar con la API. Verifica tu conexión.';
  }

  btn.disabled = false;
  btn.textContent = 'Analizar composición';
}

function copyResult() {
  if (!lastResult) return;
  navigator.clipboard.writeText(lastResult).then(() => {
    const btn = event.target;
    btn.textContent = '¡Copiado!';
    setTimeout(() => btn.textContent = 'Copiar para compartir', 2000);
  });
}

function exportCard() {
  const btn = event.target;
  btn.textContent = 'Próximamente...';
  setTimeout(() => btn.textContent = 'Exportar tarjeta', 2000);
}
</script>
